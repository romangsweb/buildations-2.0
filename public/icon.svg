<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded dark background for the icon -->
  <rect width="100" height="100" rx="20" fill="#0A0A0A"/>
  
  <g transform="translate(2, 20)">
    <!-- 1st (deepest): Blue -->
    <rect x="0" y="0" width="40" height="40" rx="3" fill="#006CFF" />
    <!-- 2nd: Cyan -->
    <rect x="4" y="4" width="40" height="40" rx="3" fill="#00B5E2" />
    <!-- 3rd: Green -->
    <rect x="8" y="8" width="40" height="40" rx="3" fill="#00D27F" />
    <!-- 4th: Light Green -->
    <rect x="12" y="12" width="40" height="40" rx="3" fill="#75E600" />
    <!-- 5th: Yellow -->
    <rect x="16" y="16" width="40" height="40" rx="3" fill="#FFD200" />
    
    <!-- 6th (front): White square with black "b" -->
    <rect x="20" y="20" width="40" height="40" rx="3" fill="#FFFFFF" />
    <text x="40" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#000000" text-anchor="middle">b</text>
    
    <!-- Circular Badge "s" on the right -->
    <!-- Background gap mask -->
    <circle cx="76" cy="40" r="21" fill="#0A0A0A" />
    <!-- Outer Circle (White) -->
    <circle cx="76" cy="40" r="18" fill="#FFFFFF" />
    <!-- Inner Circle (Dark Background) -->
    <circle cx="76" cy="40" r="12" fill="#0A0A0A" />
    <!-- Inner Letter "s" (White) -->
    <text x="76" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="middle">s</text>
  </g>
</svg>
